name: ElectricNOW Extractor Test

on:
  workflow_dispatch: # Permite que você execute manualmente clicando em um botão na aba Actions

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Script Extrator
        run: python extract.py

      - name: Fazer upload da lista gerada como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electricnow-playlist
          path: electricnow.m3u
