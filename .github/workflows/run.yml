name: ElectricNOW Extractor Test

on:
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências do Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Corrigir dependências do Ubuntu 24.04t64 e Instalar Chromium
        run: |
          # Instalamos manualmente as dependências fundamentais do Chromium adaptadas para o Ubuntu 24.04
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libgbm1 libnspr4 libnss3 libnss3-tools libv4l-0 libgstreamer-plugins-base1.0-0
          
          # Instala apenas o Chromium do Playwright sem forçar o script de dependências que quebra
          python -m playwright install chromium

      - name: Executar Script Extrator
        run: python extract.py

      - name: Fazer upload da lista gerada como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electricnow-playlist
          path: electricnow.m3u
